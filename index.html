<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍒𝓐𝓸𝓲𝓒𝓱𝓪𝓷🦋</title>
    <!-- Đường dẫn chuẩn từ root -->
    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body class="theme-dark">
    <div id="loader" class="loader"></div>

    <header class="top-bar">
        <div class="nav-left">
            <button id="menu-btn" class="btn-base btn-icon">☰</button>
            <div class="avatar"><img src="assets/img/Logo.png" alt="logo"></div>
        </div>
    </header>

    <main class="main">
        <div id="content-grid" class="grid"></div>
    </main>

    <!-- Drawer Component -->
    <aside id="menu-left" class="drawer">
        <div class="drawer-header">
            <div class="avatar"><img src="assets/img/Logo.png" alt="logo"></div>
            <button id="close-menu" class="btn-base">✘</button>
        </div>
        <div class="drawer-content">
            <button class="drawer-item">🏠 Trang chủ</button>
            <div class="drawer-divider"></div>
            <button id="open-settings" class="drawer-item">⚙ Cài đặt</button>
            <div id="settings-panel" class="settings-sub hidden">
                <div class="setting">
                    <label>Giao diện</label>
                    <select id="theme-select" class="select">
                        <option value="dark">Dark</option>
                        <option value="light">Light</option>
                    </select>
                </div>
            </div>
        </div>
    </aside>

    <div id="overlay" class="popup-overlay"></div>

    <!-- Popup Component -->
    <div id="popup-root" class="popup-window">
        <div class="popup-header">
            <span id="popup-title">📖 Chi tiết</span>
            <button id="close-popup" class="btn-base">✘</button>
        </div>
        <div id="popup-body" class="popup-body"></div>
    </div>

    <script type="module" src="core/app.js"></script>
</body>
</html>
