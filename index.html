<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌿🥀𝓐𝓸𝓲𝓒𝓱𝓪𝓷🥀🌿</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-dark">
    <div id="loader" class="loader-line"></div>
    <div id="global-click-area" class="click-area" onclick="closeAll()"></div>

    <!-- Top Bar mới: Logo đi kèm nút Menu -->
    <nav class="top-bar">
        <div class="nav-left">
            <button onclick="toggleSide('menu-drawer', event)" class="nav-btn">☰</button>
            <img src="assets/logo.png" class="nav-logo-small">
        </div>
        <button onclick="toggleSide('settings-drawer', event)" class="nav-btn">⚙️</button>
    </nav>

    <!-- Màn hình chính giờ chỉ còn footer bản quyền -->
    <footer class="footer-hero">
        <p id="sub-title" style="display: none;"></p> <!-- Ẩn sub ở hero -->
        <div class="copyright">
            <p>Gmail: aoichan@gmail.com</p>
            <p>Aoi © 2026</p>
        </div>
    </footer>

    <!-- Ngăn kéo Menu (GitHub Style) -->
    <aside id="menu-drawer" class="side-drawer left">
        <div class="drawer-header">DANH MỤC SẢN PHẨM</div>
        <div class="search-box">
            <input type="text" id="search-input" placeholder="🔍 Search resources..." oninput="searchPosts()">
        </div>
        <div id="content-grid" class="grid-menu"></div>
    </aside>

    <!-- Ngăn kéo Cài đặt -->
    <aside id="settings-drawer" class="side-drawer right">
        <div class="drawer-header">CÀI ĐẶT HỆ THỐNG</div>
        <div class="settings-content">
            <div class="setting-group">
                <label>Ngôn ngữ</label>
                <select id="lang-switch" class="aoi-select">
                    <option value="vi">Tiếng Việt</option>
                    <option value="en">English</option>
                </select>
            </div>
            <div class="setting-group">
                <label>Chủ đề</label>
                <select id="theme-select" class="aoi-select">
                    <option value="dark">Dark Mode</option>
                    <option value="light">Light Mode</option>
                </select>
            </div>
        </div>
    </aside>

    <div id="viewer" class="modal hidden">
        <button class="close-view" onclick="closeDoc()">×</button>
        <div class="modal-content" id="md-render-area"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
