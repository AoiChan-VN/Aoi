<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍒𝓐𝓸𝓲𝓒𝓱𝓪𝓷🦋</title>
    <style>
        html, body { margin: 0; padding: 0; background: #0b0b0c; color: #f5f5f7; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    </style>
    <link rel="stylesheet" href="./styles/base.css">
    <link rel="stylesheet" href="./styles/components.css">
    <link rel="stylesheet" href="./styles/theme.css">
</head>
<body class="theme-dark">
    <div id="loader" class="loader"></div>

    <header class="top-bar">
        <div class="nav-left">
            <button id="menu-btn" class="nav-btn">☰</button>
            <div class="avatar">
                <img src="./assets/img/Logo.png" alt="logo" onerror="this.src='https://placeholder.com'">
            </div>
        </div>
        <!-- Bên phải thanh bar trống trải, cực gọn! -->
        <div class="nav-right"></div>
    </header>

    <main class="main">
        <div id="content-grid" class="grid"></div>
    </main>

    <!-- Menu Trái Duy Nhất -->
    <aside id="menu-left" class="drawer left">
        <div class="menu-header">
            <div class="avatar-mini">
                <img src="./assets/img/Logo.png" alt="logo">
            </div>
            <button id="close-menu" class="close-btn-mini">✕</button>
        </div>
        
        <div class="menu-links">
            <button class="menu-item"><span class="icon">🏠</span> Home</button>
            <button class="menu-item"><span class="icon">📚</span> Docs</button>
            <hr class="divider">
            <button id="open-settings-sub" class="menu-item">
                <span class="icon">⚙️</span> <span data-key="setting_title">〈 Cài đặt 〉</span>
            </button>
        </div>

        <div id="settings-sub-panel" class="settings-sub hidden">
            <div class="setting">
                <label data-key="lang_label">〈 Ngôn ngữ 〉</label>
                <select id="lang-select" class="select"></select>
            </div>
            <div class="setting">
                <label data-key="theme_label">〈 Giao diện 〉</label>
                <select id="theme-select" class="select">
                    <option value="dark">〈 Sáng🌤️ 〉</option>
                    <option value="light">〈 Tối👻 〉</option>
                </select>
            </div>
            <div class="setting">
                <label data-key="bg_label">〈 Ảnh nền 〉</label>
                <label class="switch">
                    <input type="checkbox" id="bg-toggle">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="menu-footer">
                <p>🍒𝓐𝓸𝓲𝓒𝓱𝓪𝓷🦋 © 2026</p>
            </div>
        </div>
    </aside>

    <div id="overlay" class="overlay"></div>

    <div id="viewer" class="viewer hidden">
        <button id="close-viewer" class="close-btn">✕</button>
        <div id="viewer-content" class="viewer-content"></div>
    </div>

    <script type="module" src="./core/app.js"></script>
</body>
</html>
