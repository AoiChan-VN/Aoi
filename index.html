<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌿🥀𝓐𝓸𝓲𝓒𝓱𝓪𝓷🥀🌿</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-dark">
    <!-- Loader nội bộ -->
    <div id="loader" class="loader-line"></div>

    <nav class="glass-nav">
        
        <div class="logo">
           <img src="assets/aoi-logo/Aoi-Logo.png" alt="AoiChan Logo" style="height: 40px; width: auto; object-fit: contain;">
        </div>
        
        <div class="nav-controls">
            <select id="lang-switch">
                <option value="vi">🇻🇳</option>
                <option value="en">🇬🇧</option>
            </select>
            <button id="theme-toggle">🌓</button>
        </div>
    </nav>
    
    <main id="app">
        <header class="hero">
            <img src="assets/logo.png" class="hero-logo">
            <p id="sub-title"></p>
        </header>

        <!-- Nút điều khiển ngăn kéo -->
        <div class="drawer-controls">
            <button id="toggle-drawer" class="btn-main">📂 Xem danh sách sản phẩm</button>
        </div>

        <!-- Thanh Search + Grid được cất vào ngăn kéo này -->
        <div id="drawer" class="drawer hidden">
            <div class="drawer-content">
                <div class="search-container">
                    <input type="text" id="search-input" placeholder="🔍 Tìm kiếm..." onkeyup="searchPosts()">
                </div>
                <div id="content-grid" class="grid"></div>
                <button class="btn-close-drawer" onclick="toggleDrawer()">Đóng lại</button>
            </div>
        </div>
    </main>

    <!-- Modal xem nội dung Markdown -->
    <div id="viewer" class="modal hidden">
        <div class="modal-content">
            <button class="close-btn" onclick="closeDoc()">×</button>
            <div id="md-render-area" class="md-body"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
