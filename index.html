<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AoiChan Portfolio 2026</title>
    <link rel="stylesheet" href="./styles/main.css">
    <link rel="stylesheet" href="./styles/themes.css">
</head>
<body class="theme-dark">
    <div id="loader" class="loader"></div>

    <header class="top-bar">
        <div class="nav-left">
            <button id="menu-btn" class="nav-btn">☰</button>
            <div class="avatar"><img src="./assets/img/avatar.webp" alt="Aoi"></div>
        </div>
        <h1 class="logo">Aoi<span>Portfolio</span></h1>
    </header>

    <main class="main">
        <section id="content-grid" class="grid"></section>
    </main>

    <!-- Overlay & Sidebar -->
    <div id="overlay" class="overlay"></div>
    <aside id="menu-left" class="drawer left">
        <div class="menu-header">
            <div class="avatar-mini"><img src="./assets/img/avatar.webp"></div>
            <button id="close-menu" class="close-btn-mini">✕</button>
        </div>
        <nav class="menu-links">
            <button class="menu-item" data-key="info_title">ⓘ Thông tin</button>
            <hr class="divider">
            <button id="open-settings-sub" class="menu-item" data-key="setting_title">⚙ Cài đặt</button>
        </nav>
        <footer class="menu-footer" data-key="copyright"></footer>
    </aside>

    <!-- Viewer/Popup -->
    <div id="viewer" class="viewer hidden">
        <article class="viewer-window">
            <header class="viewer-header">
                <span class="viewer-title"></span>
                <button id="close-viewer" class="close-btn-modal">✕</button>
            </header>
            <section class="viewer-content custom-scroll"></section>
        </article>
    </div>

    <!-- Template cho Cài đặt -->
    <template id="settings-template">
        <div class="settings-popup">
            <div class="setting">
                <span data-key="theme_label">Giao diện</span>
                <select class="pop-theme-select select">
                    <option value="dark">Dark</option>
                    <option value="light">Light</option>
                </select>
            </div>
            <div class="setting">
                <span data-key="bg_label">Hình nền</span>
                <label class="switch">
                    <input type="checkbox" class="pop-bg-toggle">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="setting">
                <span data-key="lang_label">Ngôn ngữ</span>
                <select class="pop-lang-select select"></select>
            </div>
        </div>
    </template>

    <script type="module" src="./src/core/App.js"></script>
</body>
</html>
