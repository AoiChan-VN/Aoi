<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🥀𝓐𝓸𝓲𝓒𝓱𝓪𝓷🥀</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-dark show-bg">
    <div id="loader" class="loader-line"></div>
    
    <!-- Top Bar -->
    <nav class="top-bar">
        <div class="nav-left">
            <button onclick="toggleDrawer('menu-drawer')" class="nav-btn">☰</button>
            <div class="avatar-circle">
                <img src="assets/aoi-logo/Aoi-Logo.png" alt="Avatar">
            </div>
        </div>
        <div class="nav-right">
            <button onclick="toggleDrawer('settings-drawer')" class="nav-btn">⚙️</button>
        </div>
    </nav>

    <!-- Main Content: Lưới bài viết ở giữa -->
    <main class="main-container">
        <div id="content-grid" class="post-grid">
            <!-- Bài viết sẽ render vào đây -->
        </div>
    </main>

    <!-- Drawer Menu & Settings -->
    <aside id="menu-drawer" class="side-drawer left">...</aside>
    <aside id="settings-drawer" class="side-drawer right">
        <div class="drawer-header">Cài đặt</div>
        <div class="setting-item">
            <span>Ảnh nền</span>
            <label class="switch">
                <input type="checkbox" id="bg-toggle" checked onchange="toggleBg()">
                <span class="slider"></span>
            </label>
        </div>
    </aside>

    <div id="viewer" class="modal hidden">
        <button class="close-view" onclick="closeDoc()">✕</button>
        <div class="modal-content" id="md-render-area"></div>
    </div>

    <div id="overlay" onclick="closeAll()"></div>
    <script src="script.js"></script>
</body>
</html>
