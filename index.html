<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">

    <script src="https://jsdelivr.net"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="nebula-bg"></div> <!-- Hiệu ứng vũ trụ -->

    <nav class="navbar">

        <ul class="nav-links">
            <li><a href="#home" data-i18n="nav_home">Trang chủ</a></li>

            <li><a href="#blog" data-i18n="nav_blog">Bài viết</a></li>

            <option value="vi">🇻🇳 VI</option>

    <main id="content-area">

        <section id="products" class="grid-container fade-in">

        <section id="blog" class="markdown-section fade-in">
            <h2 data-i18n="title_blog">Tài liệu & Markdown</h2>
            <div id="md-viewer" class="md-content">
                <!-- Nội dung Markdown hiển thị tại đây -->
            </div>

    <footer>
        <p>&copy; 2026 AoiChan. Powered by StarDust Engine.</p>
