<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>AoiChan</title>
</head>
<body>

<div id="app"></div>

<!-- ⚙️ Floating button -->
<div class="fab" id="btn">⚙️</div>

<!-- 📱 Bottom Sheet -->
<div class="sheet" id="sheet">
  <div class="sheet-header">
    <div class="drag"></div>
    <span>Settings</span>
  </div>

  <div class="item">
    <span>Dark Mode</span>
    <label class="switch">
      <input type="checkbox" id="themeToggle">
      <span class="slider"></span>
    </label>
  </div>
</div>

<script type="module" src="/src/main.js"></script>

</body>
</html>
