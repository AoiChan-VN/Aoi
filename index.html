<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌊 𝓐𝓸𝓲𝓒𝓱𝓪𝓷🎐</title>
    <link rel="stylesheet" href="./styles/base.css">
    <link rel="stylesheet" href="./styles/components.css">
    <link rel="stylesheet" href="./styles/theme.css">
</head>
<body class="theme-dark">
    <div id="loader" class="loader"></div>

    <header class="top-bar">
        <div class="nav-left">
            <button id="menu-btn" class="nav-btn" aria-label="Menu">☰</button>
            <div class="avatar"><img src="./assets/img/Logo.png" alt="AoiLogo"></div>
        </div>
    </header>

    <main class="main">
        <div id="content-grid" class="grid">
            <!-- Render.js sẽ đổ Card vào đây -->
        </div>
    </main>

    <!-- Overlay & Drawer chung -->
    <div id="overlay" class="overlay"></div>
    <aside id="menu-left" class="drawer left">
        <!-- Content in app.js -->
    </aside>

    <!-- Viewer Modal duy nhất cho toàn App -->
    <div id="viewer" class="viewer hidden">
        <div class="viewer-window">
            <div class="viewer-header">
                <span class="viewer-title">📖</span>
                <button id="close-viewer" class="close-btn-modal">✘</button>
            </div>
            <div id="viewer-content" class="viewer-content"></div>
        </div>
    </div>

    <!-- Cấu trúc script chạy module -->
    <script type="module" src="./core/App.js"></script>
</body>
</html>
