<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>AOI Knowledge</title>
    <script src="https://tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="flex">
    <!-- Sidebar -->
    <aside class="w-64 h-screen sticky top-0 p-6 border-r border-gray-800 hidden md:block">
        <div class="text-2xl font-bold text-blue-500 mb-10">AOI</div>
        <div class="space-y-4">
            <div class="sidebar-item p-3 text-blue-400 bg-blue-500/10">🏠 Trang chủ</div>
            <div class="sidebar-item p-3 text-gray-500">📚 Tài liệu</div>
        </div>
    </aside>

    <main class="flex-1 p-8 lg:p-12">
        <!-- Search Bar -->
        <div class="mb-10 max-w-md">
            <input type="text" placeholder="Tìm kiếm bài viết..." class="w-full bg-gray-900 border border-gray-700 rounded-full py-2 px-6 focus:outline-none focus:border-blue-500">
        </div>

        <!-- Render nội dung từ data.json vào đây -->
        <div id="main-content"></div>

        <!-- Detail View (Nội dung chi tiết khi click) -->
        <div id="detail-box" class="detail-view glass-card p-8 mt-10 relative">
            <button onclick="closeDetail()" class="absolute top-4 right-6 text-gray-500 hover:text-white">✕ Close</button>
            <div id="detail-id" class="text-blue-400 font-mono text-sm mb-2"></div>
            <h1 id="detail-title" class="text-3xl font-bold mb-6"></h1>
            <div class="w-full bg-blue-500/20 h-1 rounded-full mb-6">
                <div class="bg-blue-500 h-full w-full"></div>
            </div>
            <p id="detail-content" class="text-gray-300 leading-relaxed whitespace-pre-line"></p>
        </div>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
