<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌿🥀𝓐𝓸𝓲𝓒𝓱𝓪𝓷🥀🌿</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-dark">
    <!-- Vùng tàng hình bao phủ toàn màn hình để đóng menu khi chạm -->
    <div id="global-click-area" class="click-area" onclick="closeAll()"></div>

    <nav class="top-bar">
        <button onclick="toggleSide('menu-drawer', event)" class="nav-btn">☰</button>
        <div class="logo-center"><img src="assets/aoi-logo/Aoi-Logo.png" alt="Aoi"></div>
        <button onclick="toggleSide('settings-drawer', event)" class="nav-btn">⚙️</button>
    </nav>

    <footer class="footer-hero">
        <img src="assets/aoi-logo/Aoi-Logo.png" class="hero-logo-small">
        <p id="sub-title"></p>
        <div class="copyright">
            <p>Gmail: aoichan@gmail.com</p>
            <p>Aoi © 2026</p>
        </div>
    </footer>

    <!-- Ngăn kéo Menu (Trái) -->
    <aside id="menu-drawer" class="side-drawer left">
        <div class="drawer-header">DANH SÁCH SẢN PHẨM</div>
        <div class="search-box">
            <input type="text" id="search-input" placeholder="🔍 Tìm kiếm..." onkeyup="searchPosts()">
        </div>
        <div id="content-grid" class="grid-menu"></div>
    </aside>

    <!-- Ngăn kéo Cài đặt (Phải) -->
    <aside id="settings-drawer" class="side-drawer right">
        <div class="drawer-header">CÀI ĐẶT</div>
        <div class="settings-list">
            <div class="setting-item">
                <label>Ngôn ngữ</label>
                <select id="lang-switch">
                    <option value="vi">Tiếng Việt</option>
                    <option value="en">English</option>
                </select>
            </div>
            <div class="setting-item">
                <label>Giao diện</label>
                <button id="theme-toggle" class="btn-theme">🌓 Đổi Theme</button>
            </div>
        </div>
    </aside>

    <!-- Viewer bài viết -->
    <div id="viewer" class="modal hidden">
        <button class="close-view" onclick="closeDoc()">×</button>
        <div class="modal-content" id="md-render-area"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
