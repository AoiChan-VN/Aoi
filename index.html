<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AOI - Knowledge System</title>
    <!-- Thư viện chuẩn để làm UI nhanh & xịn -->
    <script src="https://unpkg.com"></script>
    <script src="https://unpkg.com"></script>
    <script src="https://unpkg.com"></script>
    <script src="https://tailwindcss.com"></script>
    <link href="https://cloudflare.com" rel="stylesheet">
    <style>
        @import url('https://googleapis.com');
        body { font-family: 'Inter', sans-serif; background-color: #0b0e14; color: #c9d1d9; margin: 0; }
        .glass { background: rgba(22, 27, 34, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.08); }
        .card-gradient { background: linear-gradient(180deg, rgba(30,41,59,0.5) 0%, rgba(15,23,42,0.8) 100%); }
        .sidebar-item:hover { background: rgba(88, 166, 255, 0.1); color: #58a6ff; }
        .premium-border { border: 1px solid rgba(88, 166, 255, 0.3); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- DỮ LIỆU NỘI BỘ (Thay thế cho data.json để chạy ngay lập tức) ---
        const LOCAL_DATA = {
            categories: [
                {
                    id: 1, name: "Khởi đầu", color: "#bc85ff",
                    items: [
                        { id: "1.1", title: "Hệ thế giới này", desc: "Tổng quan về thế giới, con người và những quy luật cơ bản.", img: "https://unsplash.com" },
                        { id: "1.2", title: "Con đường thức tỉnh", desc: "Những dấu hiệu, giai đoạn và trải nghiệm trên hành trình.", img: "https://unsplash.com" },
                        { id: "1.3", title: "Tâm trí và nhận thức", desc: "Hiểu về tâm trí, niềm tin, bản ngã và cách tạo ra thực tại.", img: "https://unsplash.com" }
                    ]
                },
                {
                    id: 2, name: "Thực hành", color: "#58a6ff",
                    items: [
                        { id: "2.1", title: "Thiền định cơ bản", desc: "Hướng dẫn bắt đầu thiền định cho người mới, kỹ thuật đơn giản.", img: "https://unsplash.com" },
                        { id: "2.2", title: "Làm chủ cảm xúc", desc: "Nhận diện, chuyển hóa và làm chủ cảm xúc để sống an nhiên.", img: "https://unsplash.com" }
                    ]
                }
            ]
        };

        function App() {
            const [selectedItem, setSelectedItem] = useState(null);

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* 1. SIDEBAR TRÁI */}
                    <aside className="w-64 glass border-r border-gray-800 p-6 hidden md:flex flex-col">
                        <div className="text-3xl font-bold text-blue-500 mb-10 tracking-tighter italic">AOI</div>
                        <nav className="flex-1 space-y-2">
                            <div className="sidebar-item p-3 rounded-xl cursor-pointer flex items-center gap-3 text-blue-400 bg-blue-500/10"><i className="fas fa-home"></i> Trang chủ</div>
                            <div className="sidebar-item p-3 rounded-xl cursor-pointer flex items-center gap-3 text-gray-500"><i className="fas fa-book"></i> Tài liệu</div>
                            <div className="sidebar-item p-3 rounded-xl cursor-pointer flex items-center gap-3 text-gray-500"><i className="fas fa-star"></i> Yêu thích</div>
                        </nav>
                        <div className="text-[10px] text-gray-600">© 2025 AOI Docs</div>
                    </aside>

                    {/* 2. NỘI DUNG CHÍNH (GIỮA) */}
                    <main className="flex-1 overflow-y-auto p-8 custom-scroll">
                        <div className="max-w-4xl mx-auto">
                            {/* Search Bar */}
                            <div className="relative mb-12">
                                <i className="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                                <input type="text" placeholder="Tìm kiếm bài viết..." className="w-full bg-gray-900/50 border border-gray-800 rounded-full py-3 pl-12 pr-6 focus:border-blue-500 outline-none transition-all" />
                            </div>

                            {/* Render các Section */}
                            {LOCAL_DATA.categories.map(cat => (
                                <div key={cat.id} className="mb-12">
                                    <h2 className="text-xl font-semibold mb-6 flex items-center gap-3">
                                        <span className="w-2 h-2 rounded-full" style={{backgroundColor: cat.color}}></span>
                                        {cat.id}. {cat.name}
                                    </h2>
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                        {cat.items.map(item => (
                                            <div key={item.id} 
                                                 onClick={() => setSelectedItem(item)}
                                                 className="glass card-gradient p-4 rounded-2xl cursor-pointer hover:scale-[1.02] transition-all group">
                                                <img src={item.img} className="w-full h-32 object-cover rounded-xl mb-4 grayscale group-hover:grayscale-0 transition-all" />
                                                <div className="text-xs text-blue-400 font-mono mb-1">{item.id}. {item.title}</div>
                                                <p className="text-[11px] text-gray-500 leading-relaxed line-clamp-2">{item.desc}</p>
                                                <div className="mt-4 text-[10px] uppercase tracking-widest text-gray-600 group-hover:text-blue-400">Chi tiết &gt;</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ))}

                            {/* Section Nội dung chi tiết (Giống hệt ảnh dưới cùng) */}
                            {selectedItem && (
                                <div className="mt-20 glass p-10 rounded-3xl border-t-2 border-blue-500 animate-in fade-in slide-in-from-bottom-4 duration-500 relative">
                                    <button onClick={() => setSelectedItem(null)} className="absolute top-6 right-8 text-gray-500 hover:text-white">✕</button>
                                    <div className="text-blue-400 font-mono mb-2"># {selectedItem.id}. {selectedItem.title}</div>
                                    <h1 className="text-4xl font-bold mb-6 text-white">{selectedItem.title}</h1>
                                    <div className="w-full bg-gray-800 h-[2px] mb-8 overflow-hidden">
                                        <div className="bg-blue-500 h-full w-full shadow-[0_0_10px_#3b82f6]"></div>
                                    </div>
                                    <p className="text-gray-400 text-lg leading-relaxed italic">
                                        Đây là nội dung thực tế được lấy từ dữ liệu nội bộ. Thức tỉnh là hành trình quay về với bản chất thật của bạn...
                                    </p>
                                </div>
                            )}
                        </div>
                    </main>

                    {/* 3. CÀI ĐẶT (PHẢI) */}
                    <aside className="w-72 glass border-l border-gray-800 p-8 hidden lg:block">
                        <div className="flex justify-between items-center mb-10">
                            <span className="text-sm font-semibold">Cài đặt</span>
                            <i className="fas fa-times text-gray-600"></i>
                        </div>
                        
                        <div className="mb-8">
                            <label className="text-[10px] uppercase text-gray-600 block mb-4 tracking-widest">Ngôn ngữ</label>
                            <div className="grid grid-cols-2 gap-2">
                                <div className="p-3 premium-border bg-blue-500/10 rounded-xl text-center text-xs text-blue-400 flex flex-col items-center gap-2">
                                    <img src="https://flagcdn.com" className="w-6 h-4 rounded-sm" /> Tiếng Việt
                                </div>
                                <div className="p-3 border border-gray-800 rounded-xl text-center text-xs text-gray-500 flex flex-col items-center gap-2 opacity-50">
                                    <img src="https://flagcdn.com" className="w-6 h-4 rounded-sm" /> English
                                </div>
                            </div>
                        </div>

                        <div>
                            <label className="text-[10px] uppercase text-gray-600 block mb-4 tracking-widest">Giao diện</label>
                            <div className="grid grid-cols-2 gap-2">
                                <div className="p-4 premium-border bg-blue-500/10 rounded-xl text-center text-xs text-blue-400">
                                    <i className="fas fa-moon mb-2 block text-lg"></i> Dark
                                </div>
                                <div className="p-4 border border-gray-800 rounded-xl text-center text-xs text-gray-500 opacity-50">
                                    <i className="fas fa-sun mb-2 block text-lg"></i> Light
                                </div>
                            </div>
                        </div>
                    </aside>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
