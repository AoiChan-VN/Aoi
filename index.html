<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>AOI System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Sidebar trái -->
    <nav class="sidebar">
        <div class="logo">AOI</div>
        <div class="nav-item active">Trang chủ</div>
        <div class="nav-item">Tài liệu</div>
        <div class="nav-item">Yêu thích</div>
        <div class="nav-item">Ghi chú</div>
    </nav>

    <!-- Khu vực chính -->
    <main class="main">
        <input type="text" class="search-bar" placeholder="Tìm kiếm bài viết...">
        
        <div id="content-area">
            <!-- Data tự đổ vào đây -->
        </div>

        <div id="detail-view" class="detail-view">
            <!-- Nội dung chi tiết hiện ở đây -->
        </div>
    </main>

    <!-- Cài đặt phải -->
    <aside class="settings">
        <div style="margin-bottom:2rem; display:flex; justify-content:space-between;">
            <span>Cài đặt</span> <span>✕</span>
        </div>

        <div class="setting-group">
            <span class="setting-label">Ngôn ngữ</span>
            <div class="toggle-box">
                <div class="toggle-btn active">Tiếng Việt</div>
                <div class="toggle-btn">English</div>
            </div>
        </div>

        <div class="setting-group">
            <span class="setting-label">Giao diện</span>
            <div class="toggle-box">
                <div class="toggle-btn active">Dark</div>
                <div class="toggle-btn">Light</div>
            </div>
        </div>
    </aside>

    <script src="js/app.js"></script>
</body>
</html>
