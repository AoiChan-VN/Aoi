<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>AOI - Premium Knowledge Base</title>
    <script src="https://tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar hidden md:block">
        <div class="text-3xl font-bold mb-12 text-blue-500">AOI</div>
        <nav class="space-y-6 text-gray-400">
            <div class="text-blue-400">Trang chủ</div>
            <div>Tài liệu</div>
            <div>Ghi chú</div>
        </nav>
    </aside>

    <!-- Main Section -->
    <main class="flex-1 p-10 overflow-y-auto">
        <div class="max-w-5xl mx-auto">
            <input id="search-input" type="text" placeholder="Tìm kiếm bài viết..." 
                   class="w-full max-w-md bg-gray-900 border border-gray-800 rounded-full py-3 px-6 mb-12 focus:border-blue-500 outline-none">
            
            <div id="main-flow"></div>
            
            <!-- Preview Section từ ảnh -->
            <div id="detail-section" class="hidden premium-card mt-20 p-12"></div>
        </div>
    </main>

    <!-- Settings Panel (Bên phải) -->
    <aside class="settings-panel hidden lg:block text-sm">
        <div class="mb-8">Cài đặt</div>
        <div class="mb-4 text-gray-500 uppercase text-[10px]">Ngôn ngữ</div>
        <div class="grid grid-cols-2 gap-2 mb-8">
            <div class="p-2 border border-blue-500 rounded bg-blue-500/10 text-center">Tiếng Việt</div>
            <div class="p-2 border border-gray-800 rounded text-center">English</div>
        </div>
        <div class="mb-4 text-gray-500 uppercase text-[10px]">Giao diện</div>
        <div class="grid grid-cols-2 gap-2">
            <div class="p-4 border border-blue-500 rounded text-center">Dark</div>
            <div class="p-4 border border-gray-800 rounded text-center">Light</div>
        </div>
    </aside>

    <script src="js/app.js"></script>
</body>
</html>
