<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>AOI Documentation</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <aside class="sidebar">
        <div class="logo-container">
            <div class="logo-box">A</div>
            <span style="font-weight:700; letter-spacing:-1px; font-size:1.2rem;">AOI</span>
        </div>
        <nav class="nav-group">
            <a href="#" class="nav-link active">🏠 Trang chủ</a>
            <a href="#" class="nav-link">📚 Tài liệu</a>
            <a href="#" class="nav-link">⭐ Yêu thích</a>
            <a href="#" class="nav-link">📝 Ghi chú</a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="search-container">
            <svg style="position:absolute; left:12px; top:12px;" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8b949e" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input type="text" class="search-input" placeholder="Tìm kiếm bài viết...">
        </div>

        <div id="grid-render"></div>
        <div id="detail-box" class="detail-area"></div>
    </main>

    <aside class="right-panel">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span>Cài đặt</span>
            <span style="color:var(--text-dim)">✕</span>
        </div>

        <div class="setting-title">Ngôn ngữ</div>
        <div class="btn-group">
            <div class="btn-choice active">Tiếng Việt</div>
            <div class="btn-choice" style="opacity:0.5;">English</div>
        </div>

        <div class="setting-title">Giao diện</div>
        <div class="btn-group">
            <div class="btn-choice active">Dark</div>
            <div class="btn-choice" style="opacity:0.5;">Light</div>
        </div>
    </aside>

    <script src="js/app.js"></script>
</body>
</html>
