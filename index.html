<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AOI UI Final</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="top-bar">
  <div class="logo">AOI</div>
  <div class="actions">
    <button onclick="toggleSide('menu', event)">☰</button>
    <button onclick="toggleSide('settings', event)">⚙️</button>
  </div>
</div>

<div id="menu" class="side left">
  <div class="title">MENU</div>
  <div class="item">Trang chủ</div>
  <div class="item">Danh mục</div>
</div>

<div id="settings" class="side right">
  <div class="title">SETTINGS</div>

  <div class="setting">
    <div class="label">LANGUAGE</div>
    <div class="options" id="lang-options">
      <div class="opt" data-value="vi">🇻🇳 VI</div>
      <div class="opt" data-value="en">🇺🇸 EN</div>
    </div>
  </div>

  <div class="setting">
    <div class="label">THEME</div>
    <div class="options" id="theme-options">
      <div class="opt" data-value="dark">🌙</div>
      <div class="opt" data-value="light">☀️</div>
    </div>
  </div>

</div>

<div id="overlay" onclick="closeAll()"></div>

<div class="content">

  <div class="group">
    <div class="group-header">📂 Group 1</div>
    <div class="group-content">
      <div class="card"><h3>Post 1</h3><p>Demo text</p></div>
      <div class="card"><h3>Post 2</h3><p>Demo text</p></div>
    </div>
  </div>

  <div class="group">
    <div class="group-header">📂 Group 2</div>
    <div class="group-content">
      <div class="card"><h3>Post 3</h3><p>Demo text</p></div>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
