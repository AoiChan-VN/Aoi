<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AOI UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="top-bar">
  <button class="nav-btn" onclick="toggleSide('settings', event)">⚙️</button>
</div>

<!-- SETTINGS -->
<div id="settings" class="side-drawer right">
  <div class="drawer-header">Cài đặt</div>

  <div class="settings-content">

    <div class="setting-group">
      <label>Ngôn ngữ</label>
      <div class="setting-options" id="lang-options">
        <div class="option-card" data-value="vi">🇻🇳 Tiếng Việt</div>
        <div class="option-card" data-value="en">🇺🇸 English</div>
      </div>
    </div>

    <div class="setting-group">
      <label>Giao diện</label>
      <div class="setting-options" id="theme-options">
        <div class="option-card" data-value="dark">🌙 Dark</div>
        <div class="option-card" data-value="light">☀️ Light</div>
      </div>
    </div>

  </div>
</div>

<!-- DEMO CONTENT -->
<div class="grid-menu">
  <div class="card">
    <h3>Bài viết mẫu</h3>
    <p>Hover thử để thấy hiệu ứng</p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
