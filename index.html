<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AOI UI</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <button class="nav-btn" onclick="toggleSide('menu', event)">☰</button>
  <div class="logo">AOI</div>
  <button class="nav-btn" onclick="toggleSide('settings', event)">⚙️</button>
</div>

<!-- LEFT MENU -->
<div id="menu" class="side-drawer left">
  <div class="drawer-header">MENU</div>
  <div class="drawer-content">
    <div class="menu-item">Trang chủ</div>
    <div class="menu-item">Danh mục</div>
    <div class="menu-item">Giới thiệu</div>
  </div>
</div>

<!-- RIGHT SETTINGS -->
<div id="settings" class="side-drawer right">
  <div class="drawer-header">Cài đặt</div>

  <div class="settings-content">

    <div class="setting-group">
      <label>Ngôn ngữ</label>
      <div class="setting-options" id="lang-options">
        <div class="option-card" data-value="vi">🇻🇳 Tiếng Việt</div>
        <div class="option-card" data-value="en">🇺🇸 English</div>
      </div>
    </div>

    <div class="setting-group">
      <label>Giao diện</label>
      <div class="setting-options" id="theme-options">
        <div class="option-card" data-value="dark">🌙 Dark</div>
        <div class="option-card" data-value="light">☀️ Light</div>
      </div>
    </div>

  </div>
</div>

<!-- OVERLAY -->
<div id="overlay" class="overlay" onclick="closeAll()"></div>

<!-- CONTENT -->
<div class="content">

  <div class="group">
    <div class="group-header">📂 Nhóm 1 <span>▾</span></div>
    <div class="group-content">
      <div class="card">
        <h3>Bài viết 1</h3>
        <p>Mô tả ngắn nội dung...</p>
        <div class="btn">Chi tiết</div>
      </div>
      <div class="card">
        <h3>Bài viết 2</h3>
        <p>Mô tả ngắn nội dung...</p>
        <div class="btn">Chi tiết</div>
      </div>
    </div>
  </div>

  <div class="group">
    <div class="group-header">📂 Nhóm 2 <span>▾</span></div>
    <div class="group-content">
      <div class="card">
        <h3>Bài viết 3</h3>
        <p>Mô tả ngắn nội dung...</p>
        <div class="btn">Chi tiết</div>
      </div>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
