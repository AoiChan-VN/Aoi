<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌿🥀𝓐𝓸𝓲𝓒𝓱𝓪𝓷🥀🌿</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-dark">
    <!-- Loader nội bộ -->
    <div id="loader" class="loader-line"></div>

    <nav class="glass-nav">
        
        <div class="logo">
           <img src="assets/aoi-logo/Aoi-Logo.png" alt="AoiChan Logo" style="height: 40px; width: auto; object-fit: contain;">
        </div>
        
        <div class="nav-controls">
            <select id="lang-switch">
                <option value="vi">🇻🇳</option>
                <option value="en">🇬🇧</option>
            </select>
            <button id="theme-toggle">🌓</button>
        </div>
    </nav>

    <main id="app">
        <header class="hero">
            <!-- Logo ảnh lớn nếu muốn hiện giữa màn hình -->
            <!-- <img src="assets/logo.png" class="hero-logo" style="max-height: 100px; margin-bottom: 10px;"> -->
            <h1 class="aoi-title">🌿🥀𝓐𝓸𝓲𝓒𝓱𝓪𝓷🥀🌿</h1>
            <p id="sub-title"></p>
        </header>

        <!-- Thanh tìm kiếm  -->
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Tìm kiếm plugin/game..." onkeyup="searchPosts()">
        </div>
        
        <div id="content-grid" class="grid"></div>

    </main>

    <!-- Modal xem nội dung Markdown -->
    <div id="viewer" class="modal hidden">
        <div class="modal-content">
            <button class="close-btn" onclick="closeDoc()">×</button>
            <div id="md-render-area" class="md-body"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
