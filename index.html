<!DOCTYPE html>

<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AoiChan</title>

<!-- Critical CSS -->
<style>
    html, body {
        margin: 0;
        padding: 0;
        background: #0b0b0c;
        color: #f5f5f7;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
</style>

<!-- Main CSS -->
<link rel="stylesheet" href="./styles/base.css">
<link rel="stylesheet" href="./styles/components.css">
<link rel="stylesheet" href="./styles/theme.css">

</head>
<body class="theme-dark">

<!-- Loader -->
<div id="loader" class="loader"></div>

<!-- Top Bar -->
<header class="top-bar">
    <div class="nav-left">
        <button id="menu-btn" class="nav-btn">☰</button>
        <div class="avatar">
            <img src="./assets/img/Logo.png" alt="avatar">
        </div>
    </div>

    <div class="nav-right">
        <button id="settings-btn" class="nav-btn">⚙️</button>
    </div>
</header>

<!-- Main -->
<main class="main">
    <div id="content-grid" class="grid"></div>
</main>

<!-- Settings Drawer -->
<aside id="settings-drawer" class="drawer right">
    <div class="drawer-header" data-key="setting_title">Cài đặt</div>

    <div class="setting">
        <label data-key="lang_label">Ngôn ngữ</label>
        <select id="lang-select" class="select"></select>
    </div>

    <div class="setting">
        <label data-key="theme_label">Giao diện</label>
        <select id="theme-select" class="select">
            <option value="dark">Dark</option>
            <option value="light">Light</option>
        </select>
    </div>

    <div class="setting">
        <label data-key="bg_label">Ảnh nền</label>
        <label class="switch">
            <input type="checkbox" id="bg-toggle">
            <span class="slider"></span>
        </label>
    </div>
</aside>

<!-- Overlay -->
<div id="overlay" class="overlay"></div>

<!-- Viewer -->
<div id="viewer" class="viewer hidden">
    <button id="close-viewer" class="close-btn">✕</button>
    <div id="viewer-content" class="viewer-content"></div>
</div>

<!-- App -->
<script type="module" defer src="./core/app.js"></script>

</body>
</html>
