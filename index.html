<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌿🥀𝓐𝓸𝓲𝓒𝓱𝓪𝓷🥀🌿</title>
    <style>
        :root { --accent: #ff007a; --bg: #050510; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: system-ui; }
        nav { display: flex; justify-content: space-between; padding: 15px 5%; background: rgba(0,0,0,0.9); border-bottom: 1px solid #222; }
        .hero { height: 50vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .glitch { font-size: 3rem; color: var(--accent); text-shadow: 0 0 15px var(--accent); }
        .md-container { padding: 40px 10%; line-height: 1.7; }
        /* Style cho Markdown tự chế */
        .md-h1 { color: var(--accent); font-size: 2rem; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .md-bold { color: #fff; font-weight: bold; }
        .md-list { color: #ccc; margin-left: 20px; }
    </style>
</head>
<body>
    <nav>
        <div style="font-weight:bold; color:var(--accent)">☘🥀𝓐𝓸𝓲𝓒𝓱𝓪𝓷🥀☘</div>
        <select id="lang" style="background:#000; color:#fff; border:1px solid #444;">
            <option value="vi">🇻🇳</option>
            <option value="en">🇬🇧</option>
        </select>
    </nav>

    <div class="hero">
        <h1 class="glitch">𝓐𝓸𝓲 𝓒𝓱𝓪𝓷</h1>
        <p id="desc">...</p>
    </div>

    <div id="md-viewer" class="md-container">Đang tải tài liệu...</div>

    <script>
        const DATA = {
            vi: { desc: "Plugin & Game 2026", file: "intro.md" },
            vi: { desc: "Kết thúc", file: "aoichan.md" }
        };

        // Bộ chuyển đổi MD sang HTML siêu nhẹ (Không cần thư viện)
        function miniMarkdown(text) {
            return text
                .replace(/^# (.*$)/gim, '<h1 class="md-h1">$1</h1>') // Tiêu đề #
                .replace(/^\- (.*$)/gim, '<li class="md-list">$1</li>') // Gạch đầu dòng -
                .replace(/\*\*(.*)\*\*/gim, '<span class="md-bold">$1</span>') // In đậm **
                .replace(/\n/gim, '<br>'); // Xuống dòng
        }

        async function loadContent(l) {
            const lang = DATA[l];
            document.getElementById('desc').innerText = lang.desc;
            
            try {
                // Fetch trực tiếp file .md từ folder content
                const res = await fetch(`./content/${lang.file}`);
                const rawText = await res.text();
                document.getElementById('md-viewer').innerHTML = miniMarkdown(rawText);
            } catch (e) {
                document.getElementById('md-viewer').innerHTML = "Lỗi tải file .md";
            }
        }

        document.getElementById('lang').onchange = (e) => {
            localStorage.setItem('lang', e.target.value);
            loadContent(e.target.value);
        };

        // Khởi chạy
        const currentLang = localStorage.getItem('lang') || 'vi';
        document.getElementById('lang').value = currentLang;
        loadContent(currentLang);
    </script>
</body>
</html>
