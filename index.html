<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> 🌊𝓐𝓸𝓲𝓒𝓱𝓪𝓷🍒 </title>
    <!-- CSS Links -->
    <link rel="stylesheet" href="./styles/base.css">
    <link rel="stylesheet" href="./styles/theme.css">
    <link rel="stylesheet" href="./styles/layout.css">
    <link rel="stylesheet" href="./styles/card.css">
    <link rel="stylesheet" href="./styles/popup.css">
    <link rel="stylesheet" href="./styles/drawer.css">
</head>
<body class="theme-dark">
    <div id="loader" class="loader"></div>

    <header class="top-bar">
        <div class="nav-left">
            <button id="menu-btn" class="nav-btn">☰</button>
            <div class="avatar"><img src="./assets/img/Logo.png" alt="logo"></div>
        </div>
    </header>

    <main class="main">
        <div id="content-grid" class="grid"></div>
    </main>

    <aside id="menu-left" class="drawer">
        <div class="menu-header">
            <div class="avatar-mini"><img src="./assets/img/Logo.png" alt="logo"></div>
            <button id="close-menu" class="close-btn-mini">✘</button>
        </div>
        <div class="menu-links">
            <button class="menu-item" onclick="location.reload()">🏠 Trang chủ</button>
            <button id="info-btn" class="menu-item">ⓘ Thông tin</button>
            <hr class="divider">
            <button id="open-settings-sub" class="menu-item">⚙ <span data-key="setting_title">Cài đặt</span></button>
        </div>
    </aside>

    <div id="overlay" class="overlay"></div>

    <!-- POPUP HỆ THỐNG -->
    <div id="main-popup" class="popup-wrapper hidden">
        <div class="popup-window">
            <div class="popup-header">
                <span class="popup-title">📖</span>
                <button class="close-btn-modal">✘</button>
            </div>
            <div class="popup-content"></div>
        </div>
    </div>

    <!-- TEMPLATE SETTINGS -->
    <template id="settings-template">
        <div class="settings-form">
            <div class="setting-item">
                <label data-key="lang_label">Ngôn ngữ</label>
                <select class="select pop-lang-select"></select>
            </div>
            <div class="setting-item">
                <label data-key="theme_label">Giao diện</label>
                <select class="select pop-theme-select">
                    <option value="dark">🎣👻︵»Tối︵</option>
                    <option value="light">🌤️︵»Sáng︵</option>
                </select>
            </div>
            <div class="setting-item">
                <label data-key="bg_label">Ảnh nền</label>
                <label class="switch">
                    <input type="checkbox" class="pop-bg-toggle">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
    </template>

    <script type="module" src="./core/app.js"></script>
</body>
</html>
