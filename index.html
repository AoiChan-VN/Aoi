<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🥀𝓐𝓸𝓲𝓒𝓱𝓪𝓷🥀</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-dark">
    <div id="loader" class="loader-line"></div>
    <div id="global-click-area" class="click-area" onclick="closeAll()"></div>

    <nav class="top-bar">
        <div class="left-group">
            <button onclick="toggleSide('menu-drawer', event)" class="nav-btn">☰</button>
            <div class="logo-center"><img src="assets/aoi-logo/Aoi-Logo.png" alt="Aoi"></div>
        </div>
        <button onclick="toggleSide('settings-drawer', event)" class="nav-btn">⚙️</button>
    </nav>

    <!-- Menu Bài Viết -->
    <aside id="menu-drawer" class="side-drawer left">
        <div class="drawer-header">【Bài viết】</div>
        <div class="search-box">
            <input type="text" id="search-input" placeholder="🔎 Tìm kiếm..." oninput="searchPosts()">
        </div>
        
        <div id="content-grid" class="grid-menu">
            <!-- Bài viết sẽ render ở đây -->
        </div>
        
        <div class="drawer-footer">
            <img src="assets/aoi-logo/Aoi-Logo.png" class="footer-logo-inside">
            <div class="copyright-inside">
                <p>𝓐𝓸𝓲𝓒𝓱𝓪𝓷❤</p>
                <p>© 2026</p>
            </div>
        </div>
    </aside>

    <!-- Menu Cài Đặt -->
    <aside id="settings-drawer" class="side-drawer right">
        <div class="drawer-header">【Cài đặt】</div>
        <div class="settings-content">
            <div class="setting-group">
                <label>【Ngôn ngữ】</label>
                <select id="lang-switch" class="aoi-select">
                    <option value="vi">「VN」</option>
                    <option value="en">「EN」</option>
                </select>
            </div>
            <div class="setting-group">
                <label>【Giao diện】</label>
                <select id="theme-select" class="aoi-select">
                    <option value="dark">「Tối」</option>
                    <option value="light">「Sáng」</option>
                </select>
            </div>
        </div>
    </aside>

    <!-- Trình xem nội dung -->
    <div id="viewer" class="modal hidden">
        <button class="close-view" onclick="closeDoc()">✘</button>
        <div class="modal-content" id="md-render-area"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
