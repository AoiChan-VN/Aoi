<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>꧁🥀𝓐𝓸𝓲𝓒𝓱𝓪𝓷🥀꧂</title>
    
    <!-- Critical CSS: Hiển thị ngay lập tức không chờ file .css -->
    <style>
        :root { --bg: #050510; --accent: #ff007a; }
        body { background: var(--bg); margin: 0; overflow-x: hidden; color: #fff; font-family: sans-serif; }
        .loading-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; justify-content: center; align-items: center; transition: opacity 0.4s; }
        .navbar { height: 60px; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); position: fixed; width: 100%; top: 0; z-index: 100; }
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
    </style>
    
    <!-- Tải CSS chính một cách bất đồng bộ -->
    <link rel="stylesheet" href="style.css" media="print" onload="this.media='all'">
</head>
<body>
    <!-- Màn hình chờ siêu nhẹ -->
    <div id="loader" class="loading-screen">✨</div>

    <div id="nebula-bg"></div>

    <nav class="navbar">
        <div class="logo" style="margin-left: 5%;">🥀𝓐𝓸𝓲𝓒𝓱𝓪𝓷🥀</div>
    </nav>

    <main id="content-area">
        <section class="hero">
            <h1 class="glitch" style="font-size: 3.5rem;">𝓐𝓸𝓲 𝓒𝓱𝓪𝓷</h1>
            <p id="hero-text">Loading energy...</p>
        </section>
        
        <div id="product-list" class="grid" style="padding: 0 10%;"></div>
        <div id="md-viewer" style="padding: 5% 10%;"></div>
    </main>

    <!-- Tải Script ở cuối và dùng defer -->
    <script src="https://jsdelivr.net" defer></script>
    <script src="script.js" defer></script>
</body>
</html>
