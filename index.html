<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🥀𝓐𝓸𝓲𝓒𝓱𝓪𝓷🥀</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body class="theme-dark">
    <div id="loader" class="loader-line"></div>
    <div id="global-click-area" class="click-area" onclick="AoiApp.closeAll()"></div>

    <nav class="top-bar">
        <button onclick="toggleSide('menu-drawer', event)" class="nav-btn">☰</button>
        <div class="logo-center"><img src="assets/aoi-logo/Aoi-Logo.png" alt="Aoi" onerror="this.style.display='none'"></div>
        <button onclick="toggleSide('settings-drawer', event)" class="nav-btn">⚙️</button>
    </nav>
    
    <aside id="menu-drawer" class="side-drawer left">
        <div class="drawer-header">【 Bài Viết 】</div>
        <div class="search-box"><input type="text" id="search-input" placeholder="🔎 Tìm kiếm..."></div>
        <div id="content-grid" class="grid-menu"></div>
    </aside>

    <aside id="settings-drawer" class="side-drawer right">
        <div class="drawer-header">【 Cài Đặt 】</div>
        <div class="settings-content">
            <div class="setting-group">
                <label>Ngôn ngữ</label>
                <select id="lang-switch" class="aoi-select">
                    <option value="vi">Tiếng Việt</option>
                    <option value="en">English</option>
                </select>
            </div>
            <div class="setting-group">
                <label>Giao diện</label>
                <select id="theme-select" class="aoi-select">
                    <option value="dark">Tối</option>
                    <option value="light">Sáng</option>
                </select>
            </div>
        </div>
    </aside>

    <div id="viewer" class="modal hidden">
        <button class="close-view" onclick="closeDoc()">✕</button>
        <div class="modal-content" id="md-render-area"></div>
    </div>

    <footer class="footer-hero">
        <div class="copyright"><p>𝓐𝓸𝓲𝓒𝓱𝓪𝓷 ❤ Premium</p></div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
