<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌿🥀𝓐𝓸𝓲𝓒𝓱𝓪𝓷🥀🌿</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-dark">
    <!-- Hiệu ứng Loader -->
    <div id="loader" class="loader-line"></div>
    <!-- Lớp phủ mờ khi mở Drawer (Bấm vào đây sẽ đóng menu) -->
    <div id="overlay" class="overlay hidden" onclick="closeAllDrawers()"></div>

    <!-- Thanh Top Bar -->
    <nav class="top-bar">
        <button id="menu-open" class="nav-btn">☰</button>
        <div class="logo-center"><img src="assets/aoi-logo/Aoi-Logo.png" alt="Aoi Logo"></div>
        <button id="settings-open" class="nav-btn">⚙️</button>
    </nav>

    <!-- Logo và Copyright -->
    <footer class="footer-hero">
        <img src="assets/aoi-logo/Aoi-Logo.png" class="hero-logo-small">
        <p id="sub-title"></p>
        <div class="copyright">
            <p>Gmail: 24HouStreamer@gmail.com</p>
            <p>Aoi © 2026</p>
        </div>
    </footer>
    
    <!-- Ngăn kéo bên TRÁI (Menu Bài viết) -->
    <aside id="menu-drawer" class="side-drawer left">
        <div class="drawer-header">
            <span>DANH SÁCH BÀI VIẾT</span>
            <button class="close-drawer" onclick="toggleSide('menu-drawer')">×</button>
        </div>
        <div class="search-box">
            <input type="text" id="search-input" placeholder="🔎 Tìm kiếm..." onkeyup="searchPosts()">
        </div>
        <div id="content-grid" class="grid-menu"></div>
    </aside>

    <!-- Ngăn kéo bên PHẢI (Cài đặt) -->
    <aside id="settings-drawer" class="side-drawer right">
        <div class="drawer-header">
            <span>CÀI ĐẶT HỆ THỐNG</span>
            <button class="close-drawer" onclick="toggleSide('settings-drawer')">×</button>
        </div>
        <div class="settings-list">
            <div class="setting-item">
                <label>Ngôn ngữ 🌏</label>
                <select id="lang-switch">
                    <option value="vi">Tiếng Việt 🇻🇳</option>
                    <option value="en">English 🇬🇧</option>
                </select>
            </div>
            <div class="setting-item">
                <label>Giao diện 🦋</label>
                <button id="theme-toggle" class="btn-theme">Đổi Theme</button>
            </div>
        </div>
    </aside>

    <!-- Modal xem nội dung Markdown -->
    <div id="viewer" class="modal hidden">
        <div class="modal-content">
            <button class="close-view" onclick="closeDoc()">×</button>
            <div id="md-render-area" class="md-body"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
