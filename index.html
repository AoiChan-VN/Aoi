<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🥀𝓐𝓸𝓲𝓒𝓱𝓪𝓷🥀</title>
    <link rel="stylesheet" href="core/style.css">
</head>
<body class="theme-dark show-bg">
    <div id="loader" class="loader-line"></div>

    <nav class="top-bar">
        <div class="nav-left">
            <button onclick="toggleSide('menu-drawer')" class="nav-btn">☰</button>
            <div class="avatar-circle"><img src="assets/aoi-img/Aoi-Logo.png"></div>
        </div>
        <div class="nav-right">
            <button onclick="toggleSide('settings-drawer')" class="nav-btn">⚙️</button>
        </div>
    </nav>
    
    <main class="main-content">
        <div id="content-grid" class="post-grid"></div>
    </main>

    <aside id="settings-drawer" class="side-drawer right">
        <div class="drawer-header" data-key="setting_title">【 Cài đặt 】</div>
        <div class="settings-content">
            <div class="setting-group">
                <label data-key="lang_label">Ngôn ngữ</label>
                <select id="lang-select" class="aoi-select" onchange="window.app.changeLanguage(this.value)">
                    <option value="vi">Tiếng Việt</option>
                    <option value="en">English</option>
                    <option value="ja">日本語</option>
                </select>
            </div>
            <div class="setting-group">
                <label data-key="bg_label">Ảnh nền</label>
                <label class="switch">
                    <input type="checkbox" id="bg-toggle" onchange="window.app.updateSettings()">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="setting-group">
                <label data-key="theme_label">Giao diện</label>
                <select id="theme-select" class="aoi-select" onchange="window.app.updateSettings()">
                    <option value="dark" data-key="theme_dark">Tối</option>
                    <option value="light" data-key="theme_light">Sáng</option>
                </select>
            </div>
        </div>
    </aside>

    <div id="global-overlay" onclick="closeAll()"></div>
    <div id="viewer" class="modal hidden">
        <button class="close-view" onclick="window.app.closeDoc()">✕</button>
        <div class="modal-content" id="md-render-area"></div>
    </div>

    <script type="module">
        import { AoiFramework } from './core/framework.js';
        window.app = new AoiFramework();
        window.onload = () => window.app.init();
        
        // Shortcuts for Global UI
        window.toggleSide = (id) => window.app.toggleSide(id);
        window.closeAll = () => window.app.closeAll();
    </script>
</body>
</html>
