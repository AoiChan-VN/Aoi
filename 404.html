<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Không tìm thấy trang</title>
    <!-- Sử dụng file CSS có sẵn -->
    <link rel="stylesheet" href="/Aoi/style.css"> 
    <style>
        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 90vh;
            text-align: center;
        }
        .error-img {
            max-width: 250px;
            height: auto;
            margin-bottom: 20px;
        }
        .btn-back {
            margin-top: 20px;
            padding: 10px 25px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <!-- Thay 'aoi-404.png' bằng tên file ảnh có sẵn trong thư mục assets của anh -->
        <img src="/Aoi/assets/aoi-404/404.svg" alt="Error 404" class="error-img">
        
        <h1>🥀 Lỗi rồi bạn ơi!</h1>
        <p>Trang này không tồn tại hoặc dữ liệu đã bị xóa.</p>
        
        <a href="/Aoi/" class="btn-back">Quay về trang chủ</a>
    </div>

    <!-- Dùng chung logic xử lý của script.js -->
    <script src="/Aoi/script.js"></script>
</body>
</html>
