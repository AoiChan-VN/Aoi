name: в—ЎрџҐЂрќ“ђрќ“ёрќ“Ірќ“’рќ“±рќ“Єрќ“·рџҐЂв—Ў П‰С”РІ

on:
  push:
    branches: ["main"]

permissions:
  actions: write
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: рџ“Ґ Checkout
        uses: actions/checkout@v4

      - name: рџџў Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: рџ“¦ Install
        run: npm install

      - name: рџ”Ё Build
        run: npm run build

      - name: рџ“¤ Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: рџљЂ Deploy
        id: deployment
        uses: actions/deploy-pages@v4
        
      - name: в™»пёЏрќђЋрќђ‹рќђѓ рќђ–рќђЋрќђ‘рќђЉрќђ…рќђ‹рќђЋрќђ–рќђ’
        run: |
          gh api repos/${{ github.repository }}/actions/runs \
            --paginate \
            --jq '.workflow_runs | sort_by(.created_at) | reverse | .[5:] | map(select(.status=="completed")) | .[].id' \
            | while read run; do
                echo "рџ—‘пёЏ Д‘ГЈ xГіa $run"
                gh api repos/${{ github.repository }}/actions/runs/$run -X DELETE
              done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: в™»пёЏрќђЋрќђ‹рќђѓ рќђ‚рќђЂрќђ‚рќђ‡рќђ„
        run: |
          gh cache list --json id,createdAt \
            | jq 'sort_by(.createdAt) | reverse | .[5:] | .[].id' \
            | while read id; do
                echo "рџ—‘пёЏ Д‘ГЈ xГіa $id"
                gh cache delete "$id"
              done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
