name: в—ЎрџҐЂрќ“ђрќ“ёрќ“Ірќ“’рќ“±рќ“Єрќ“·рџҐЂв—Ў П‰С”РІ

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  actions: write
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: рџ“Ґ Checkout repository
        uses: actions/checkout@v6
      - name: вљЎInstall, рџ“¦build, рџ“¤and upload site
        uses: withastro/action@v6
        with:
          # path: . # The root location of your Astro project inside the repository. (optional)
          # node-version: 24 # The specific version of Node that should be used to build your site. Defaults to 22. (optional)
          package-manager: pnpm@latest # The Node package manager that should be used to install dependencies and build your site. Automatically detected based on your lockfile. (optional)
          # build-cmd: pnpm run build # The command to run to build your site. Runs the package build script/task by default. (optional)
        # env:
          # PUBLIC_POKEAPI: 'https://pokeapi.co/api/v2' # Use single quotation marks for the variable value. (optional)

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: 
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Triб»ѓn khai вћєгЂђGitHub PagesгЂ‘
        id: deployment
        uses: actions/deploy-pages@v5
        
      - name: Delete deployment
        uses: strumwolf/delete-deployment-environment@v3
        with:
          token: ${{ secrets.AOI_ACTIONS }}
          environment: github-pages
          onlyRemoveDeployments: true
        
      - name: рџ—‘пёЏ рќђЋрќђ‹рќђѓ рќђ–рќђЋрќђ‘рќђЉрќђ…рќђ‹рќђЋрќђ–рќђ’
        run: |
          gh api repos/${{ github.repository }}/actions/runs \
            --paginate \
            --jq '.workflow_runs | sort_by(.created_at) | reverse | .[5:] | map(select(.status=="completed")) | .[].id' \
            | while read run; do
                echo "рџ—‘пёЏ Д‘ГЈ xГіa $run"
                gh api repos/${{ github.repository }}/actions/runs/$run -X DELETE
              done
        env:
          GH_TOKEN: ${{ secrets.AOI_ACTIONS }}

      - name: рџ—‘пёЏ рќђЋрќђ‹рќђѓ рќђ‚рќђЂрќђ‚рќђ‡рќђ„
        run: |
          gh cache list --json id,createdAt \
            | jq 'sort_by(.createdAt) | reverse | .[5:] | .[].id' \
            | while read id; do
                echo "рџ—‘пёЏ Д‘ГЈ xГіa $id"
                gh cache delete "$id"
              done
        env:
          GH_TOKEN: ${{ secrets.AOI_ACTIONS }}
