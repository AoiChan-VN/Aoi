name: в—ЎрџҐЂрќ“ђрќ“ёрќ“Ірќ“’рќ“±рќ“Єрќ“·рџҐЂв—Ў П‰С”РІ

on:
  push:
    branches: ["main"]
 # workflow_dispatch:

permissions:
  actions: write
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: рџ“Ґ Checkout
        uses: actions/checkout@v6

      - name: вљЎ Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: рџџў Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: рџ“¦ Install deps
        run: pnpm install --frozen-lockfile

      - name: рџЏ— Build
        run: pnpm build
        
      - name: рџ“¤ Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist
          
  deploy:
    needs: build
    runs-on: ubuntu-latest
    
    environment: 
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Triб»ѓn khai вћєгЂђGitHub PagesгЂ‘
        id: deployment
        uses: actions/deploy-pages@v5
        
      - name: рџ—‘пёЏ рќђЋрќђ‹рќђѓ deployment
        uses: strumwolf/delete-deployment-environment@v3
        with:
          token: ${{ secrets.AOI_ACTIONS }}
          environment: github-pages
          onlyRemoveDeployments: true
        
      - name: рџ—‘пёЏ рќђЋрќђ‹рќђѓ рќђ–рќђЋрќђ‘рќђЉрќђ…рќђ‹рќђЋрќђ–рќђ’
        run: |
          gh api repos/${{ github.repository }}/actions/runs \
            --paginate \
            --jq '.workflow_runs | sort_by(.created_at) | reverse | .[5:] | map(select(.status=="completed")) | .[].id' \
            | while read run; do
                echo "рџ—‘пёЏ Д‘ГЈ xГіa $run"
                gh api repos/${{ github.repository }}/actions/runs/$run -X DELETE
              done
        env:
          GH_TOKEN: ${{ secrets.AOI_ACTIONS }}

      - name: рџ—‘пёЏ рќђЋрќђ‹рќђѓ рќђ‚рќђЂрќђ‚рќђ‡рќђ„
        run: |
          gh cache list --json id,createdAt \
            | jq 'sort_by(.createdAt) | reverse | .[5:] | .[].id' \
            | while read id; do
                echo "рџ—‘пёЏ Д‘ГЈ xГіa $id"
                gh cache delete "$id"
              done
        env:
          GH_TOKEN: ${{ secrets.AOI_ACTIONS }}
